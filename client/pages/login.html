<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Gear Store</title>
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <main class="auth-container">
    <section class="auth-left">
      <a href="index.html" class="auth-brand">
        <img src="../assets/logo.png" alt="Gear Store Logo" />
        <h1>Gear Store</h1>
      </a>
      <p>Login to continue shopping and manage your gaming gear.</p>
    </section>

    <section class="auth-right">
      <h2>Login</h2>
      <form id="loginForm" class="auth-form">
        
        <div class="input-box"><i class="fa-solid fa-envelope"></i><input type="email" id="email" placeholder="Enter your email" required oninvalid="this.setCustomValidity('Please enter a valid email address.')" oninput="this.setCustomValidity('')" /></div>
        <div class="input-box"><i class="fa-solid fa-lock"></i><input type="password" id="password" placeholder="Enter your password" required oninvalid="this.setCustomValidity('Please enter your password.')" oninput="this.setCustomValidity('')" /></div>
        <button type="submit" class="auth-btn">Login</button>
      </form>
      <p class="auth-link">Don't have an account? 
        <a href="register.html">Register now</a>
      </p>
    </section>
  </main>
  <script src="../js/auth/login.js"></script>
</body>
</html>
