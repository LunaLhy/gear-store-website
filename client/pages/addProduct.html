<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Add Product - GearStore</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/addProduct.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>

  <header class="header">
    <a href="index.html" class="logo main-logo">
      <img src="../assets/logo.png" alt="GearStore Logo" />
      <span>Gear Store</span>
    </a>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search products..." />

      <button id="searchBtn">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </div>

    <nav class="nav">
      <a href="cart.html" class="cart-link">
        <i class="fa-solid fa-cart-shopping"></i>
      </a>

      <a href="login.html" id="loginLink" class="login-btn">
        <i class="fa-regular fa-circle-user"></i>
        <span>Log in</span>
      </a>

      <div id="userBox" class="user-box" style="display:none;">
        <button id="accountBtn" class="account-btn">
          <i class="fa-solid fa-user"></i>

          <span id="userName"></span>

          <span id="adminBadge" class="admin-badge" style="display:none;">
            ADMIN
          </span>

          <i class="fa-solid fa-chevron-down"></i>
        </button>

        <div id="accountDropdown" class="account-dropdown">
          <a href="managerProducts.html" class="admin-only">
            Manager Products
          </a>

          <button id="logoutBtn">
            Logout
          </button>
        </div>
      </div>
    </nav>
  </header>

  <main class="add-page">

    <section class="add-header">

  <div>
    <h1>Add Product</h1>

    <p>
      Create a new product for GearStore.
    </p>
  </div>

  <a href="managerProducts.html" class="back-manager-btn">
    <i class="fa-solid fa-arrow-left"></i>
    Back to Manager
  </a>

</section>

    <section class="add-card">

      <div class="image-preview">
        <img id="previewImage" src="" alt="Product Preview" />

        <p id="previewText">
          Image preview
        </p>
      </div>

      <form id="addProductForm" class="add-form">

        <div class="form-grid">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="name" required />
          </div>

          <div class="form-group">
            <label>Brand</label>
            <input type="text" id="brand" required />
          </div>
        </div>

        <div class="form-group">
          <label>Main Image URL</label>
          <input type="text" id="image" required />
        </div>

        <div class="form-group">
          <label>Images</label>

          <textarea
            id="images"
            placeholder="Each image URL on one line"
          ></textarea>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Price</label>
            <input type="number" id="price" required />
          </div>

          <div class="form-group">
            <label>Count In Stock</label>
            <input type="number" id="countInStock" required />
          </div>
        </div>

        <div class="form-group">
          <label>Category</label>

          <select id="category" required>
            <option value="">Select category</option>

            <option value="ban phim">Keyboard</option>
            <option value="chuot">Mouse</option>
            <option value="tai nghe">Headphone</option>
            <option value="mic">Microphone</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Description</label>

          <textarea id="description" required></textarea>
        </div>

        <button type="submit" class="add-submit-btn">
          <i class="fa-solid fa-plus"></i>
          Add Product
        </button>

      </form>

    </section>

  </main>

  <div id="toast"></div>

  <script src="../js/components/navbar.js"></script>

  <script
    type="module"
    src="../js/products/searchProducts.js"
  ></script>

  <script src="../js/products/adminProducts.js"></script>

</body>
</html>
