<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminHub - GearStore</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .edit-container { max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { background-color: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; flex: 1; }
        .btn-delete { background-color: #dc3545; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2>AdminHub</h2>
        <form id="editForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="editName" required>
            </div>
            <div class="form-group">
                <label>Price</label>
                <input type="number" id="editPrice" required>
            </div>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" id="editBrand" required>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="btn-save">Save changes</button>
                <button type="button" id="deleteBtn" class="btn-delete">Remove</button>
            </div>
        </form>
    </div>

    <script type="module" src="../js/editProduct.js"></script>
</body>
</html>
