<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Products - Gear Store</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/product.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div data-navbar></div>

  <section class="product-toolbar">
    <h2 id="productTitle">All Products</h2>
    <select id="sortSelect">
      <option value="default">Sort By</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="name-asc">Name: A to Z</option>
    </select>
  </section>

  <main class="product-page-main">
    <div id="productContainer" class="product-grid"></div>
  </main>

  <div data-footer></div>

  <script src="../js/components/navbar.js"></script>
  <script src="../js/products/searchProducts.js"></script>
  <script src="../js/products/Products.js"></script>
</body>
</html>
