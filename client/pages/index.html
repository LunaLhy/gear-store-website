<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gear Store</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/product.css" />
</head>
<body>

    <header class="header">
    <div class="logo">GearStore</div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search products..." />
        <button id="searchBtn">🔍</button>
    </div>

    <nav class="nav">
        <div class="product-menu">
        <button id="productMenuBtn">Products</button>

        <div id="megaMenu" class="mega-menu">
            <div class="menu-left">
            <div class="menu-item active" data-group="mouse">Mouse</div>
            <div class="menu-item" data-group="keyboard">Keyboard</div>
            <div class="menu-item" data-group="headphone">Headphone</div>
            <div class="menu-item" data-group="micro">Micro</div>
            <div class="menu-item" data-group="other">Other</div>
            </div>

            <div class="menu-right" id="menuDetail"></div>
        </div>
        </div>

        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="addProduct.html">Admin</a>
    </nav>
    </header>

    <section class="banner">
    <div class="banner-content">
        <h1>Gaming Gear Collection</h1>
        <p>Simple • Clean • Powerful</p>
    </div>
    </section>

    <section class="simple-category">
    <div class="simple-card" data-category="keyboard">
        <img src="https://images.unsplash.com/photo-1587829741301-dc798b83add3" alt="Keyboard">
        <h3>Keyboard</h3>
    </div>

    <div class="simple-card" data-category="mouse">
        <img src="https://images.unsplash.com/photo-1527814050087-3793815479db" alt="Mouse">
        <h3>Mouse</h3>
    </div>

    <div class="simple-card" data-category="headphone">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e" alt="Headphone">
        <h3>Headphone</h3>
    </div>

    <div class="simple-card" data-category="micro">
        <img src="https://images.unsplash.com/photo-1590602847861-f357a9332bbc" alt="Micro">
        <h3>Micro</h3>
    </div>

    <div class="simple-card" data-category="other">
        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475" alt="Other">
        <h3>Other</h3>
    </div>
    </section>

    <section class="filter-bar">
    <div>
        <h3>Category</h3>

        <select id="categoryFilter">
        <option value="all">All</option>
        <option value="mouse">Mouse</option>
        <option value="keyboard">Keyboard</option>
        <option value="headphone">Headphone</option>
        <option value="micro">Micro</option>
        <option value="other">Other</option>
        </select>
    </div>

    <div>
        <h3>Price</h3>

        <select id="priceFilter">
        <option value="all">All Price</option>
        <option value="0-500000">Dưới 500K</option>
        <option value="500000-1000000">500K - 1 triệu</option>
        <option value="1000000-2000000">1 - 2 triệu</option>
        <option value="2000000-5000000">2 - 5 triệu</option>
        <option value="5000000-999999999">Trên 5 triệu</option>
        </select>
    </div>

    <div>
        <h3>Brand</h3>

        <select id="brandFilter">
        <option value="all">All Brand</option>
        </select>
    </div>
    </section>

    <main>
    <div id="productContainer" class="product-grid"></div>
    </main>

    <footer class="footer">
    <p>© 2026 Gear Store Website</p>
    </footer>

    <script type="module" src="../js/main.js"></script>
</body>
</html>
