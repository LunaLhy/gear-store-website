<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Gear Store</title>
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <main class="auth-container">
    <section class="auth-left">
      <a href="index.html" class="auth-brand">
        <img src="../assets/logo.png" alt="Gear Store Logo" />
        <h1>Gear Store</h1>
      </a>
      <p>Build your dream gaming setup with premium gear products.</p>
    </section>

    <section class="auth-right">
      <h2>Registration</h2>
      <form id="registerForm" class="auth-form">
        
        <div class="input-box"><i class="fa-solid fa-user"></i>
          <input type="text" id="name" placeholder="Enter your name" required oninvalid="this.setCustomValidity('Please enter your name.')" oninput="this.setCustomValidity('')" /></div>
        <div class="input-box"><i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="Enter your email" required oninvalid="this.setCustomValidity('Please enter a valid email address.')" oninput="this.setCustomValidity('')" /></div>
        <div class="input-box"><i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Enter your password" required oninvalid="this.setCustomValidity('Please enter your password.')" oninput="this.setCustomValidity('')" /></div>
        <button type="submit" class="auth-btn">Register</button>
      </form>
      <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>
  <script src="../js/auth/register.js"></script>
</body>
</html>
