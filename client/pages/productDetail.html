<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Product Detail - GearStore</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/productDetail.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>

  <main class="detail-page">

    <section class="detail-header">
      <div>
        <h1>Product Detail</h1>
        <p>Edit product information below.</p>
      </div>

      <a href="managerProducts.html" class="back-btn">
        Back to Manager
      </a>
    </section>

    <section class="detail-card">

      <div class="image-preview">
        <img id="previewImage" src="" alt="Product Preview" />
      </div>

      <form id="productDetailForm" class="detail-form">

        <div class="form-grid">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="name" required />
          </div>

          <div class="form-group">
            <label>Brand</label>
            <input type="text" id="brand" required />
          </div>
        </div>

        <div class="form-group">
          <label>Main Image URL</label>
          <input type="text" id="image" required />
        </div>

        <div class="form-group">
          <label>Images</label>
          <textarea
            id="images"
            placeholder="Each image URL on one line"
          ></textarea>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Price</label>
            <input type="number" id="price" required />
          </div>

          <div class="form-group">
            <label>Count In Stock</label>
            <input type="number" id="countInStock" required />
          </div>
        </div>

        <div class="form-group">
          <label>Category</label>
          <input type="text" id="category" required />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="description" required></textarea>
        </div>

        <div class="detail-actions">
          <button type="submit" class="save-btn">
            <i class="fa-solid fa-floppy-disk"></i>
            Save Changes
          </button>

          <button type="button" id="deleteBtn" class="delete-btn">
            <i class="fa-solid fa-trash"></i>
            Delete Product
          </button>
        </div>

      </form>

    </section>

  </main>

  <script src="../js/products/productDetail.js"></script>

</body>
</html>
