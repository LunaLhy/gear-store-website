<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail - Gear Store</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/productDetail.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div data-navbar></div>

  <main class="detail-container">
    <section class="detail-card">
      <div class="detail-left">
        <div class="main-image-box">
          <button id="prevImageBtn" class="image-nav prev-btn"><i class="fa-solid fa-chevron-left"></i>
          </button>
          <img id="mainImage" src="" alt="Product Image" />
          <button id="nextImageBtn" class="image-nav next-btn"><i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
        <div id="thumbnailList" class="thumbnail-list"></div>
      </div>

      <div class="detail-right">
        <h1 id="productName"></h1>
        <p class="brand-line">Brand: 
          <span id="productBrand"></span>
        </p>
        <div class="price-box">
          <h2 id="productPrice"></h2>
        </div>
        <p id="productStock" class="stock-detail"></p>
        <div class="description-box">
          <h3>Description</h3>
          <p id="productDescription"></p>
        </div>
        <p class="category-line">Category: <span id="productCategory"></span></p>
        <div class="detail-actions">
          <button id="addCartBtn" class="detail-cart-btn"><i class="fa-solid fa-cart-shopping">
          </i> Add to Cart</button>
          <button id="buyNowBtn" class="buy-now-btn"><i class="fa-solid fa-bolt">
          </i> Buy Now</button>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/components/navbar.js"></script>
  <script src="../js/products/searchProducts.js"></script>
  <script src="../js/products/productDetail.js"></script>
</body>
</html>
