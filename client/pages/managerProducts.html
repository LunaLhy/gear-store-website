<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager Products - Gear Store</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/managerProducts.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div data-navbar></div>

  <main class="manager-container">
    <div class="manager-header">
      <h1>Manager Products</h1>
      <button id="openAddModalBtn" class="add-btn">
        <i class="fa-solid fa-plus"></i> Add Product</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Edit</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
      </table>
    </div>
  </main>

  <template id="productModalTemplate">
    <div class="modal-box modal-box-wide">
      <div class="modal-header">
        <h2 class="modal-title"></h2>
        <button class="close-btn" type="button"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <div class="modal-content-grid">
        <div class="modal-image-area">
          <div class="modal-image-preview">
            <button type="button" class="modal-img-nav prev"><i class="fa-solid fa-chevron-left"></i>
            </button>
            <img class="preview-image" src="" alt="Product Preview" />
            <button type="button" class="modal-img-nav next"><i class="fa-solid fa-chevron-right"></i>
            </button>
            <p class="preview-text">Image preview</p>
          </div>
          <div class="modal-thumbnail-list"></div>
        </div>

        <form class="product-form">
          <input type="hidden" name="id" />
          <div class="form-grid">
            <div class="form-group">
              <label>Name</label>
              <input name="name" type="text" required />
            </div>
            <div class="form-group">
              <label>Brand</label>
              <input name="brand" type="text" required />
            </div>
          </div>
          <div class="form-group">
            <label>Main Image URL</label>
            <input name="image" type="text" required />
          </div>
          <div class="form-group">
            <label>Images</label>
            <textarea name="images" placeholder="Each image URL on one line"></textarea>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label>Price</label>
              <input name="price" type="number" min="0" required />
            </div>
            <div class="form-group">
              <label>Count In Stock</label>
              <input name="countInStock" type="number" min="0" required />
            </div>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select name="category" required>
              <option value="">Select category</option>
              <option value="Keyboard">Keyboard</option>
              <option value="Mouse">Mouse</option>
              <option value="Headphone">Headphone</option>
              <option value="Microphone">Microphone</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea name="description" required></textarea>
          </div>
          <button type="submit" class="save-btn"></button>
        </form>
      </div>
    </div>
  </template>

  <div id="addModal" class="modal-overlay"></div>
  <div id="editModal" class="modal-overlay"></div>
  <div id="toast"></div>

  <script src="../js/components/navbar.js"></script>
  <script src="../js/products/searchProducts.js"></script>
  <script src="../js/products/managerProducts.js"></script>
</body>
</html>
